<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
	<meta charset="UTF-8">
	<title layout:title-pattern="$CONTENT_TITLE - Meu Sistema">Meu Sistema</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" th:href="@{/}">Início</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="menuNav">

				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" id="laboratoriosDropdown" role="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							Laboratórios
						</a>
						<ul class="dropdown-menu" aria-labelledby="laboratoriosDropdown">
							<li><a class="dropdown-item" th:href="@{/laboratorios/cadastrar}">Cadastrar</a></li>
							<li><a class="dropdown-item" th:href="@{/laboratorios/consultar}">Consultar</a></li>
						</ul>
					</li>

					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" id="clientesDropdown" role="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							Clientes
						</a>
						<ul class="dropdown-menu" aria-labelledby="clientesDropdown">
							<li><a class="dropdown-item" th:href="@{/clientes/cadastrar}">Cadastrar</a></li>
							<li><a class="dropdown-item" th:href="@{/clientes/consultar}">Consultar</a></li>
						</ul>
					</li>



					<li class="nav-item"><a class="nav-link" th:href="@{/}">Produtos</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/}">Vendedores</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Área de conteúdo -->
	<div class="container mt-4" layout:fragment="conteudo">
		<!-- Conteúdo dinâmico será injetado aqui -->
	</div>



	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
