<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cadastrar Cliente</title>
</head>
<body>
<div layout:fragment="conteudo">
    <h2>Cadastrar Cliente</h2>

    <form th:action="@{/clientes/cadastrar}" th:object="${cliente}" method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" th:field="*{nome}" class="form-control" autofocus required/>
            <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
        </div>

        <div class="mb-3">
            <label for="endereco" class="form-label">Endereço</label>
            <input type="text" th:field="*{endereco}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" th:field="*{cidade}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="uf" class="form-label">UF</label>
            <input type="text" th:field="*{uf}" class="form-control" maxlength="2"/>
        </div>

        <div class="mb-3">
            <label for="cep" class="form-label">CEP</label>
            <input type="text" th:field="*{cep}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="cpf" class="form-label">CPF</label>
            <input type="text" th:field="*{cpf}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control"/>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>

    <div th:if="${param.sucesso}">
        <p class="text-success">Cliente cadastrado com sucesso!</p>
    </div>
</div>
</body>
</html>
